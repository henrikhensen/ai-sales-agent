[alembic]
# Migration scripts live alongside the rest of the database infrastructure
# code rather than at the repo root, to keep Clean Architecture layering
# intact (this is infrastructure, not project scaffolding).
script_location = backend/infrastructure/database/migrations

# Timestamp-prefixed filenames sort chronologically without relying on the
# revision graph alone.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# The actual connection URL is supplied by env.py (via
# backend.shared.config.Settings.database_url) so the same .env used by
# the application is the single source of truth — nothing to configure
# here, and no connection string to accidentally commit.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
