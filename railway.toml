# For the "backend" Railway service. Root Directory must be "/" (repo
# root). See DEPLOYMENT_RAILWAY.md for the full click path and required
# environment variables — this file only pins the build/start config so
# Railway never has to guess it from a monorepo with two Dockerfiles.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway runs startCommand directly (no shell), so "$PORT" was passed to
# uvicorn as the literal 3-character string "$PORT" instead of being
# expanded — uvicorn then rejects it as a non-integer --port. Wrapping in
# `sh -c "..."` forces shell expansion of $PORT at container start.
startCommand = "sh -c \"uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}\""
healthcheckPath = "/health"
