name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        # No database or Redis needed: the suite uses the mock LLM provider
        # and a TestClient without the app lifespan, so no external services
        # or secrets are required here.
        run: python -m pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build frontend
        # NEXT_PUBLIC_API_BASE_URL is a public, non-secret placeholder — real
        # deployments set their own value at build time.
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: npm run build
